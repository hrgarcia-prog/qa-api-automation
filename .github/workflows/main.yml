
name: QA API Tests

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Ejecutar pruebas
        continue-on-error: true
        run: |
          newman run AgrupadorBFF_collection.json \
            -e qa_env.json \
            -d DataDetalle.csv \
            -r cli,htmlextra \
            --reporter-htmlextra-export reporte.html\
            --reporter-htmlextra-export-dir .

            
      - name: Verificar archivo
        run: ls -la

      - name: Guardar reporte
        uses: actions/upload-artifact@v4
        with:
          name: reporte-qa
          path: reporte.html
